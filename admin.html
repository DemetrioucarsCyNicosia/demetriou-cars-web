<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-dark: #0d0d12; 
            --accent: #bfa36a; 
            --card-bg: rgba(20, 20, 28, 0.95); 
            --line-color: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff; 
            --text-muted: #90909a; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 40px 20px; }
        .admin-container { max-width: 700px; margin: 0 auto; background: var(--card-bg); border: 1px solid var(--line-color); padding: 40px; border-radius: 4px; }
        .form-title { font-family: "Times New Roman", serif; color: var(--accent); font-size: 22px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid var(--line-color); padding-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        .form-group input, .form-group select { background: #14141c; border: 1px solid var(--line-color); color: #fff; padding: 12px; font-size: 13px; outline: none; border-radius: 2px; }
        .form-group .upload-box { border: 1px dashed var(--accent); padding: 20px; text-align: center; background: rgba(20, 20, 28, 0.5); cursor: pointer; border-radius: 2px; }
        .form-group .upload-box input[type="file"] { display: none; }
        .upload-label { color: #fff; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
        .btn-submit { display: block; width: 100%; background: var(--accent); color: #0d0d12; border: none; padding: 15px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 2px; margin-top: 25px; }
        .btn-submit:hover { background: #d4bc8d; }
        .stock-section { margin-top: 50px; border-top: 1px solid var(--line-color); padding-top: 30px; }
        .stock-title { font-family: "Times New Roman", serif; color: var(--accent); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .car-item { display: flex; justify-content: space-between; align-items: center; background: #14141c; border: 1px solid var(--line-color); padding: 15px 20px; margin-bottom: 10px; border-radius: 2px; }
        .car-info h4 { font-size: 14px; text-transform: uppercase; color: #fff; }
        .btn-delete { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 8px 14px; font-size: 10px; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
        .btn-delete:hover { background: #ff4d4d; color: #fff; }
        .status-msg { font-size: 12px; margin-top: 15px; text-align: center; font-weight: bold; }
        .error { color: #ff4d4d; }
        .success { color: #2ecc71; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2 class="form-title">Προσθήκη Νέου Ο
