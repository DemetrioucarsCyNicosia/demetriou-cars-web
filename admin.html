<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Demetriou Cars</title>
    <!-- Supabase SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Προσθήκη Νέου Οχήματος</h1>
    <form id="carForm">
        <input type="text" id="brand_model" placeholder="Μάρκα & Μοντέλο" required><br>
        <input type="text" id="country" placeholder="Χώρα εισαγωγής" required><br>
        <input type="number" id="year" placeholder="Έτος"><br>
        <input type="text" id="mileage" placeholder="Χιλιόμετρα"><br>
        <input type="text" id="color" placeholder="Χρώμα"><br>
        <input type="text" id="price" placeholder="Τιμή"><br>
        <button type="submit" id="submitBtn">Καταχώρηση στο Στοκ</button>
    </form>

    <div id="statusMessage" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        // Αντικατάστησε με τα δικά σου στοιχεία από το Supabase Dashboard
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('statusMessage');
            
            btn.disabled = true;
            msg.innerText = "Καταχώρηση σε εξέλιξη...";

            const carData = {
                brand_model: document.getElementById('brand_model').value,
                country: document.getElementById('country').value,
                year: parseInt(document.getElementById('year').value) || null,
                mileage: document.getElementById('mileage').value,
                color: document.getElementById('color').value,
                price: document.getElementById('price').value
            };

            try {
                const { data, error } = await supabase
                    .from('cars')
                    .insert([carData]);

                if (error) throw error;

                msg.style.color = "green";
                msg.innerText = "Το όχημα καταχωρήθηκε επιτυχώς!";
                document.getElementById('carForm').reset();
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Σφάλμα: " + err.message;
                console.error("Supabase Error:", err);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
