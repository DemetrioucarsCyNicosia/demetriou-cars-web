<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #0d0d12; --accent: #bfa36a; --card-bg: rgba(20, 20, 28, 0.95); --line-color: rgba(255, 255, 255, 0.1); --text-main: #ffffff; --text-muted: #90909a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 40px 20px; }
        .admin-container { max-width: 700px; margin: 0 auto; background: var(--card-bg); border: 1px solid var(--line-color); padding: 40px; border-radius: 4px; }
        .form-title { font-family: "Times New Roman", serif; color: var(--accent); font-size: 22px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid var(--line-color); padding-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        .form-group input, .form-group select { background: #14141c; border: 1px solid var(--line-color); color: #fff; padding: 12px; font-size: 13px; outline: none; border-radius: 2px; }
        .btn-submit { display: block; width: 100%; background: var(--accent); color: #0d0d12; border: none; padding: 15px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 2px; margin-top: 25px; }
        .stock-section { margin-top: 50px; border-top: 1px solid var(--line-color); padding-top: 30px; }
        .stock-title { font-family: "Times New Roman", serif; color: var(--accent); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .car-item { display: flex; justify-content: space-between; align-items: center; background: #14141c; border: 1px solid var(--line-color); padding: 15px 20px; margin-bottom: 10px; border-radius: 2px; }
        .car-info h4 { font-size: 14px; text-transform: uppercase; color: #fff; }
        .btn-delete { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 8px 14px; font-size: 10px; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
        .status-msg { font-size: 12px; margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2 class="form-title">Προσθήκη Νέου Οχήματος</h2>
        <form id="carForm">
            <div class="form-grid">
                <div class="form-group full-width"><label>Μάρκα & Μοντέλο</label><input type="text" id="brandModel" placeholder="π.χ. LEXUS RX350" required></div>
                <div class="form-group"><label>Έτος Κατασκευής</label><input type="number" id="year" required></div>
                <div class="form-group"><label>Χιλιόμετρα</label><input type="text" id="mileage" required></div>
                <div class="form-group"><label>Χρώμα</label><input type="text" id="color"></div>
                <div class="form-group"><label>Προέλευση / Χώρα</label><input type="text" id="country"></div>
                <div class="form-group"><label>Κατάσταση</label><select id="status"><option value="Σε απόθεμα">Σε απόθεμα</option><option value="Coming Soon">Coming Soon</option></select></div>
                <div class="form-group"><label>Τιμή</label><input type="text" id="price"></div>
                <div class="form-group full-width"><label>URLs Εικόνων (με κόμμα ανάμεσα)</label><input type="text" id="imageUrls" placeholder="https://url1.jpg, https://url2.jpg"></div>
            </div>
            <button type="submit" class="btn-submit">Καταχώρηση</button>
            <div id="statusMessage" class="status-msg"></div>
        </form>
        <div class="stock-section"><h3 class="stock-title">Τρέχον Στοκ</h3><div id="stockList"></div></div>
    </div>
    <script>
        const sbUrl = "https://qwcdqsmoaobmbeaviioh.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Y2Rxc21vYW9ibWJlYXZpaW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzA4ODMsImV4cCI6MjA5NjM0Njg4M30.gba-EgEOCQPPvJONrXOUlxQke4caSjnEZ-L9lpy7zaw";
        const sbClient = supabase.createClient(sbUrl, sbKey);

        async function fetchStock() {
            const { data: cars } = await sbClient.from('cars').select('*').order('id', { ascending: false });
            document.getElementById('stockList').innerHTML = (cars || []).map(car => `
                <div class="car-item">
                    <div class="car-info"><h4>${car.brand_model || 'N/A'}</h4></div>
                    <button class="btn-delete" onclick="deleteCar(${car.id})">Διαγραφή</button>
                </div>`).join('');
        }

        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const imgInput = document.getElementById('imageUrls').value.trim();
            const carData = {
                brand_model: document.getElementById('brandModel').value.trim(),
                year: parseInt(document.getElementById('year').value),
                mileage: parseInt(document.getElementById('mileage').value.replace(/[^0-9]/g, '')),
                color: document.getElementById('color').value.trim(),
                country: document.getElementById('country').value.trim(),
                status: document.getElementById('status').value,
                price: parseInt(document.getElementById('price').value.replace(/[^0-9]/g, '')) || null,
                images: imgInput ? imgInput.split(',').map(u => u.trim()) : []
            };
            const { error } = await sbClient.from('cars').insert([carData]);
            if(!error) { document.getElementById('carForm').reset(); fetchStock(); }
        });

        async function deleteCar(id) { if(confirm("Διαγραφή;")) { await sbClient.from('cars').delete().eq('id', id); fetchStock(); } }
        window.onload = fetchStock;
    </script>
</body>
</html>
