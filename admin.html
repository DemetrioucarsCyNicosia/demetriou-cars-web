<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0d0d12;
            --accent: #bfa36a;
            --card-bg: rgba(20, 20, 28, 0.85);
            --line-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #90909a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body {
            background: linear-gradient(rgba(11, 11, 15, 0.85), rgba(11, 11, 15, 0.95)), 
                        url('https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?auto=format&fit=crop&w=1800&q=95') no-repeat center center fixed;
            background-size: cover; color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        
        /* LOGIN CARD */
        .login-card { background: var(--card-bg); border: 1px solid var(--line-color); padding: 40px; border-radius: 4px; width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        .login-card h2 { font-family: "Times New Roman", serif; color: var(--accent); letter-spacing: 2px; margin-bottom: 30px; font-weight: 400; text-transform: uppercase; }
        
        /* DASHBOARD (HIDDEN BY DEFAULT) */
        .dashboard-container { display: none; width: 100%; max-width: 800px; background: var(--card-bg); border: 1px solid var(--line-color); padding: 40px; border-radius: 4px; backdrop-filter: blur(10px); }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line-color); padding-bottom: 20px; margin-bottom: 30px; }
        .dashboard-header h2 { font-family: "Times New Roman", serif; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 400; }
        
        /* FORM & INPUTS */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--line-color); color: #fff; border-radius: 2px; outline: none; font-size: 14px; }
        .input-group input:focus { border-color: var(--accent); }
        
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        
        .btn-action { width: 100%; background: var(--accent); color: #0d0d12; border: none; padding: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; cursor: pointer; border-radius: 2px; transition: all 0.3s; }
        .btn-action:hover { background: #fff; }
        .btn-logout { background: transparent; color: var(--text-muted); border: 1px solid var(--line-color); padding: 8px 15px; font-size: 11px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; }
        .btn-logout:hover { color: #ff4a4a; border-color: #ff4a4a; }
        
        .error-msg { color: #ff4a4a; font-size: 13px; margin-top: 15px; display: none; }
        .success-msg { color: #4aff4a; font-size: 13px; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="login-card" id="loginBlock">
        <h2>Admin Portal</h2>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="aris@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn-action" onclick="handleLogin()">Sign In</button>
        <div class="error-msg" id="errorBlock">Λάθος στοιχεία σύνδεσης. Προσπαθήστε ξανά.</div>
    </div>

    <div class="dashboard-container" id="dashboardBlock">
        <div class="dashboard-header">
            <h2>Προσθήκη Νέου Οχήματος</h2>
            <button class="btn-logout" onclick="handleLogout()">Έξοδος</button>
        </div>
        
        <div class="form-grid">
            <div class="input-group full-width">
                <label>Μάρκα & Μοντέλο (π.χ. Toyota RAV4 Black Edition)</label>
                <input type="text" id="carModel" placeholder="π.χ. Toyota RAV4">
            </div>
            <div class="input-group">
                <label>Έτος (π.χ. 2023)</label>
                <input type="number" id="carYear" placeholder="2023">
            </div>
            <div class="input-group">
                <label>Χιλιόμετρα (π.χ. 12,450 km)</label>
                <input type="text" id="carMileage" placeholder="12,450 km">
            </div>
            <div class="input-group">
                <label>Χρώμα</label>
                <input type="text" id="carColor" placeholder="Pearl White">
            </div>
            <div class="input-group">
                <label>Προέλευση / Χώρα</label>
                <input type="text" id="carCountry" placeholder="Japan">
            </div>
            <div class="input-group full-width">
                <label>Link Φωτογραφίας (Image URL)</label>
                <input type="text" id="carImg" placeholder="https://images.unsplash.com/...">
            </div>
            <div class="full-width" style="margin-top: 10px;">
                <button class="btn-action" onclick="submitNewCar()">Καταχώρηση Στο Στοκ</button>
            </div>
        </div>
        <div class="success-msg" id="successBlock">Το αυτοκίνητο προστέθηκε επιτυχώς στο Showroom!</div>
        <div class="error-msg" id="dashErrorBlock">Κάτι πήγε στραβά. Ελέγξτε τα πεδία.</div>
    </div>

    <script>
        const sbClient = supabase.createClient(
            "https://qwcdqsmoaobmbeaviioh.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Y2Rxc21vYW9ibWJlYXZpaW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzA4ODMsImV4cCI6MjA5NjM0Njg4M30.gba-EgEOCQPPvJONrXOUlxQke4caSjnEZ-L9lpy7zaw"
        );

        // Έλεγχος αν είναι ήδη συνδεδεμένος
        window.onload = function() {
            if (localStorage.getItem('sb-admin-session') === 'true') {
                showDashboard();
            }
        };

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const err = document.getElementById('errorBlock');
            err.style.display = "none";

            const { data, error } = await sbClient.auth.signInWithPassword({ email, password });

            if (error) {
                err.innerText = "Αποτυχία σύνδεσης: " + error.message;
                err.style.display = "block";
            } else {
                localStorage.setItem('sb-admin-session', 'true');
                showDashboard();
            }
        }

        function showDashboard() {
            document.getElementById('loginBlock').style.display = 'none';
            document.getElementById('dashboardBlock').style.display = 'block';
        }

        function handleLogout() {
            localStorage.removeItem('sb-admin-session');
            window.location.reload();
        }

        async function submitNewCar() {
            const brand_model = document.getElementById('carModel').value;
            const year = parseInt(document.getElementById('carYear').value);
            const mileage = document.getElementById('carMileage').value;
            const color = document.getElementById('carColor').value;
            const country = document.getElementById('carCountry').value;
            const image_url = document.getElementById('carImg').value;

            const sBlock = document.getElementById('successBlock');
            const eBlock = document.getElementById('dashErrorBlock');
            sBlock.style.display = "none";
            eBlock.style.display = "none";

            if(!brand_model || !year) {
                eBlock.innerText = "Τα πεδία Μάρκα/Μοντέλο και Έτος είναι υποχρεωτικά.";
                eBlock.style.display = "block";
                return;
            }

            const { data, error } = await sbClient.from('cars').insert([
                { brand_model, year, mileage, color, country, image_url }
            ]);

            if (error) {
                eBlock.innerText = "Σφάλμα Supabase: " + error.message;
                eBlock.style.display = "block";
            } else {
                sBlock.style.display = "block";
                // Καθαρισμός φόρμας
                document.getElementById('carModel').value = '';
                document.getElementById('carYear').value = '';
                document.getElementById('carMileage').value = '';
                document.getElementById('carColor').value = '';
                document.getElementById('carCountry').value = '';
                document.getElementById('carImg').value = '';
            }
        }
    </script>
</body>
</html>
