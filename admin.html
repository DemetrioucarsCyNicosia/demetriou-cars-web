<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #0d0d12; --accent: #bfa36a; --card-bg: rgba(20, 20, 28, 0.95); --line-color: rgba(255, 255, 255, 0.1); --text-main: #ffffff; --text-muted: #90909a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 40px 20px; background-image: url('https://www.demetrioucarsnicosia.com/images/bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); border: 1px solid var(--line-color); padding: 40px; border-radius: 4px; backdrop-filter: blur(10px); }
        .form-title { font-family: "Times New Roman", serif; color: var(--accent); font-size: 22px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; border-bottom: 1px solid var(--line-color); padding-bottom: 15px; text-align: left; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; font-weight: bold; }
        .form-group input, .form-group select { background: #14141c; border: 1px solid var(--line-color); color: #fff; padding: 14px; font-size: 13px; outline: none; border-radius: 2px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        .upload-box { border: 1px dashed var(--accent); padding: 20px; text-align: center; background: rgba(20, 20, 28, 0.5); cursor: pointer; border-radius: 2px; }
        .upload-box input[type="file"] { display: none; }
        .upload-label { color: #fff; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-submit { display: block; width: 100%; background: var(--accent); color: #0d0d12; border: none; padding: 16px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 2px; margin-top: 25px; transition: background 0.3s; }
        .btn-submit:hover { background: #d4bc8d; }
        .stock-section { margin-top: 50px; border-top: 1px solid var(--line-color); padding-top: 30px; }
        .stock-title { font-family: "Times New Roman", serif; color: var(--accent); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .car-item { display: flex; justify-content: space-between; align-items: center; background: #14141c; border: 1px solid var(--line-color); padding: 15px 20px; margin-bottom: 10px; border-radius: 2px; }
        .car-info h4 { font-size: 13px; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
        .car-info p { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .btn-delete { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 8px 14px; font-size: 10px; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-weight: bold; transition: all 0.3s; }
        .btn-delete:hover { background: #ff4d4d; color: #fff; }
        .status-msg { font-size: 12px; margin-top: 15px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        .error { color: #ff4d4d; }
        .success { color: #2ecc71; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2 class="form-title">Προσθήκη Νέου Οχήματος</h2>
        <form id="carForm">
            <div class="form-grid">
                <div class="form-group"><label>Μάρκα</label><input type="text" id="brand" placeholder="π.χ. LEXUS" required></div>
                <div class="form-group"><label>Μοντέλο</label><input type="text" id="model" placeholder="π.χ. RX350 H VERSION L" required></div>
                <div class="form-group"><label>Έτος</label><input type="number" id="year" placeholder="2024" required></div>
                <div class="form-group"><label>Χιλιόμετρα</label><input type="text" id="mileage" placeholder="50.000" required></div>
                <div class="form-group"><label>Χρώμα</label><input type="text" id="color" placeholder="Silver"></div>
                <div class="form-group"><label>Προέλευση / Χώρα</label><input type="text" id="country" placeholder="UK"></div>
                <div class="form-group"><label>Κατάσταση (Status)</label><select id="status"><option value="Σε απόθεμα">Σε απόθεμα</option><option value="Coming Soon">Coming Soon</option></select></div>
                <div class="form-group"><label>Τιμή (Αφήστε κενό για On Request)</label><input type="text" id="price" placeholder="90000"></div>
                
                <div class="form-group full-width">
                    <label>Φωτογραφίες Οχήματος</label>
                    <div class="upload-box" onclick="document.getElementById('carImages').click()">
                        <span class="upload-label" id="uploadLabel">📁 Επιλογή Φωτογραφιών</span>
                        <input type="file" id="carImages" accept="image/*" multiple>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-submit">Καταχώρηση στο Στοκ</button>
            <div id="statusMessage" class="status-msg"></div>
        </form>
        <div class="stock-section"><h3 class="stock-title">Τρέχον Στοκ & Διαγραφή</h3><div id="stockList">Φόρτωση οχημάτων...</div></div>
    </div>
