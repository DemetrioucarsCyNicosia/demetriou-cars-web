<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: sans-serif; padding: 20px; }
        form { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #c5a059; padding: 10px; width: 100%; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <form id="carForm">
        <h2>Προσθήκη Νέου Οχήματος</h2>
        <input type="text" id="brand_model" placeholder="Μάρκα & Μοντέλο" required>
        <input type="text" id="country" placeholder="Χώρα εισαγωγής" required>
        <input type="text" id="price" placeholder="Τιμή">
        <button type="submit">Καταχώρηση στο Στοκ</button>
    </form>

    <script>
        // Αρχικοποίηση ΜΟΝΟ μία φορά
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const carData = {
                brand_model: document.getElementById('brand_model').value,
                country: document.getElementById('country').value,
                price: document.getElementById('price').value
            };

            const { data, error } = await supabase
                .from('cars')
                .insert([carData]);

            if (error) {
                console.error("Σφάλμα:", error);
                alert("Σφάλμα: " + error.message);
            } else {
                alert("Επιτυχής καταχώρηση!");
                document.getElementById('carForm').reset();
            }
        });
    </script>
</body>
</html>
