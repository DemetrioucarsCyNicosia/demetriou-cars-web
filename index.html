    <style>
        /* --- PREMIUM LUXURY DARK DESIGN SYSTEM --- */
        :root {
            --bg-main: #0b0b0f;       
            --bg-card: #14141c;       
            --text-main: #ffffff;     
            --text-muted: #90909a;    
            --accent: #bfa36a;        
            --line-color: #22222a;    
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Sticky Header */
        header {
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line-color);
            background: var(--bg-main);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-block {
            display: flex;
            align-items: center;
            cursor: pointer;
            width: 160px;
        }

        .logo-block svg {
            width: 100%;
            height: auto;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 40px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            transition: color 0.2s ease;
            font-weight: 500;
        }

        nav a:hover { color: var(--accent); }

        .fb-header-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 45px;
            padding: 6px 14px;
            border: 1px solid var(--accent);
            border-radius: 2px;
            color: var(--accent);
            text-decoration: none;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .fb-header-btn:hover {
            background: var(--accent);
            color: #0d0d12;
        }
        .fb-header-btn svg { fill: currentcolor; }

        /* --- THE NEW SPLIT HERO STRUCTURE --- */
        .premium-hero-container {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* 1. Πρώτο Background: Καθαρό τμήμα για το μεγάλο λογότυπο */
        .hero-logo-row {
            background: var(--bg-main);
            padding: 40px 20px 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-big-logo {
            width: 100%;
            max-width: 380px;
            height: auto;
        }
