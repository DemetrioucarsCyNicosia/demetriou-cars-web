<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demetriou CarsCy Nicosia | Εισαγωγές & Πωλήσεις Αυτοκινήτων</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #1a1a1a; --accent-color: #e50914; --bg-light: #f4f4f4; --card-bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-light); color: #333; }
        header { background-color: var(--primary-color); color: #fff; padding: 20px 50px; text-align: center; }
        .showroom { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .showroom h2 { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .car-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .car-img { width: 100%; height: 180px; object-fit: cover; }
        .car-details { padding: 15px; }
        .car-price { color: var(--accent-color); font-weight: bold; margin-top: 5px; }
        .contact-box { background: #fff; padding: 30px; text-align: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .contact-box h2 { margin-bottom: 10px; }
        footer { background-color: #111; color: #666; text-align: center; padding: 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>Demetriou <span style="color:var(--accent-color)">CarsCy</span></h1>
    </header>

    <section class="showroom">
        <h2>Διαθέσιμα Οχήματα</h2>
        <div class="grid" id="carGrid"></div>

        <div class="contact-box">
            <h2>Επικοινωνία</h2>
            <p>Συμπληρώστε το αίτημά σας για το μοντέλο που σας ενδιαφέρει:</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Demetriou CarsCy. All rights reserved.</p>
    </footer>

    <script>
        const sbClient = supabase.createClient(
            "https://qwcdqsmoaobmbeaviioh.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Y2Rxc21vYW9ibWJlYXZpaW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzA4ODMsImV4cCI6MjA5NjM0Njg4M30.gba-EgEOCQPPvJONrXOUlxQke4caSjnEZ-L9lpy7zaw"
        );

        async function fetchCars() {
            const { data: cars } = await sbClient.from('cars').select('*');
            if (cars) {
                const grid = document.getElementById('carGrid');
                grid.innerHTML = cars.map(car => `
                    <div class="car-card">
                        <img src="${car.image_url}" alt="${car.brand_model}" class="car-img">
                        <div class="car-details">
                            <div class="car-title"><b>${car.brand_model}</b></div>
                            <div class="car-price">€${car.price}</div>
                        </div>
                    </div>
                `).join('');
            }
        }
        fetchCars();
    </script>
</body>
</html>
