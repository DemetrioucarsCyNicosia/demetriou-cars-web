<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Λεπτομέρειες Οχήματος | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0b0b0f; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; }
        .wrapper { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        /* Logo styling */
        .logo-header { text-align: center; margin-bottom: 50px; }
        .logo-header img { width: 100%; max-width: 400px; height: auto; }

        .btn-back { display: inline-block; padding: 10px 20px; border: 1px solid #bfa36a; color: #bfa36a; text-decoration: none; border-radius: 4px; font-weight: bold; margin-bottom: 30px; }
        
        h1 { color: #bfa36a; text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        .main-img { width: 100%; border-radius: 8px; margin-bottom: 20px; display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .details-box { background: #16161d; padding: 30px; border-radius: 8px; border: 1px solid #2a2a35; margin-top: 20px; }
        .price { font-size: 32px; font-weight: bold; color: #bfa36a; margin-bottom: 20px; }
        p { margin: 10px 0; font-size: 18px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="wrapper" id="carDetails">
        <div class="logo-header">
            <!-- Βάλε εδώ το σωστό URL του λογοτύπου σου -->
            <img src="URL_TO_YOUR_LOGO" alt="C.J. Demetriou Motors">
        </div>
        
        <a href="cars.html" class="btn-back">← Επιστροφή στο Showroom</a>
        
        <div id="content">
            <h1 id="carTitle">Φόρτωση...</h1>
            <div id="gallery"></div>
            <div class="details-box" id="info"></div>
        </div>
    </div>

    <script>
        const sbUrl = "https://qwcdqsmoaobmbeaviioh.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Y2Rxc21vYW9ibWJlYXZpaW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzA4ODMsImV4cCI6MjA5NjM0Njg4M30.gba-EgEOCQPPvJONrXOUlxQke4caSjnEZ-L9lpy7zaw";
        const sbClient = supabase.createClient(sbUrl, sbKey);

        const carId = new URLSearchParams(window.location.search).get('id');

        async function loadDetails() {
            const { data: car } = await sbClient.from('cars').select('*').eq('id', carId).single();
            if (!car) return;

            document.getElementById('carTitle').innerText = car.brand_model;
            
            const gallery = document.getElementById('gallery');
            const images = car.images && car.images.length > 0 ? car.images : [car.image_url];
            gallery.innerHTML = images.map(img => `<img src="${img}" class="main-img">`).join('');

            const displayPrice = car.price ? parseInt(car.price.replace(/[^0-9]/g, '')).toLocaleString('el-GR') + " €" : "On Request";
            
            document.getElementById('info').innerHTML = `
                <div class="price">${displayPrice}</div>
                <p><strong>Έτος:</strong> ${car.year}</p>
                <p><strong>Χώρα:</strong> ${car.country || 'N/A'}</p>
                <p><strong>Χιλιόμετρα:</strong> ${car.mileage || 'N/A'} km</p>
            `;
        }
        loadDetails();
    </script>
</body>
</html>
