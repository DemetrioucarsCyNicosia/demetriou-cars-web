<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Λεπτομέρειες Οχήματος | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0b0b0f; color: white; font-family: sans-serif; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .main-img { width: 100%; border-radius: 8px; margin-bottom: 20px; }
        h1 { color: #bfa36a; }
        .price { font-size: 24px; font-weight: bold; margin: 20px 0; }
        .btn-back { display: inline-block; padding: 10px 20px; background: #bfa36a; color: #0b0b0f; text-decoration: none; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container" id="carDetails">
        <a href="cars.html" class="btn-back">← Επιστροφή</a>
        <h1>Φόρτωση...</h1>
    </div>

    <script>
        const sbUrl = "https://qwcdqsmoaobmbeaviioh.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Y2Rxc21vYW9ibWJlYXZpaW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzA4ODMsImV4cCI6MjA5NjM0Njg4M30.gba-EgEOCQPPvJONrXOUlxQke4caSjnEZ-L9lpy7zaw";
        const sbClient = supabase.createClient(sbUrl, sbKey);

        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');

        async function loadDetails() {
            const { data: car, error } = await sbClient.from('cars').select('*').eq('id', carId).single();
            if (error || !car) {
                document.getElementById('carDetails').innerHTML = "<h1>Το όχημα δεν βρέθηκε</h1>";
                return;
            }

            document.getElementById('carDetails').innerHTML = `
                <a href="cars.html" class="btn-back">← Επιστροφή</a>
                <h1>${car.brand_model}</h1>
                <img src="${(car.images && car.images[0]) ? car.images[0] : car.image_url}" class="main-img">
                <div class="price">${car.price ? car.price + ' €' : 'On Request'}</div>
                <p>Έτος: ${car.year}</p>
                <p>Χώρα: ${car.country || 'N/A'}</p>
            `;
        }
        loadDetails();
    </script>
</body>
</html>
