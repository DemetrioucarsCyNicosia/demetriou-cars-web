<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | C.J. Demetriou Motors</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --accent: #c5a880;
            --accent-hover: #b3946b;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Header & Navigation */
        header {
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container h2 {
            font-family: 'Times New Roman', serif;
            letter-spacing: 2px;
            font-size: 18px;
            color: var(--accent);
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
        }

        /* Showroom Layout */
        .showroom-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .showroom-title {
            font-family: 'Times New Roman', serif;
            font-size: 32px;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 40px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        /* Filters */
        .filter-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
        }

        .filter-section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .filter-group select {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        /* Grid & Cards */
        .showroom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .car-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }

        .car-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        /* Slider Styles */
        .image-slider-container {
            position: relative;
            width: 100%;
            height: 240px;
            background-color: #000;
            overflow: hidden;
        }

        .slider-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slider-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .slider-img.active {
            opacity: 1;
            position: relative;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
            transition: background 0.3s;
        }

        .slider-btn:hover {
            background: var(--accent);
        }

        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--accent);
            color: #000;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
            z-index: 5;
        }

        .car-info {
            padding: 25px;
        }

        .car-info h3 {
            font-family: 'Times New Roman', serif;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .specs p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
        }

        .country-tag {
            font-size: 11px;
            background-color: #222;
            padding: 3px 8px;
            border-radius: 3px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Action Buttons Container */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-action {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.3s;
        }

        .btn-action:hover {
            opacity: 0.9;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
        }

        .btn-viber {
            background-color: #665CAC;
            color: white;
        }

        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; gap: 20px; }
            .showroom-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h2 style="font-family:'Times New Roman', serif; letter-spacing:2px; font-size:18px; color:var(--accent);">C.J. DEMETRIOU MOTORS</h2>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cars.html" class="active">Cars</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <div class="showroom-container">
        <h1 class="showroom-title">Our Showroom</h1>

        <!-- Φίλτρα -->
        <div class="filter-section">
            <h3>Φιλτράρισμα Showroom</h3>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Μάρκα / Μοντέλο</label>
                    <select id="filterBrand" onchange="applyFilters()">
                        <option value="all">Όλα τα Οχήματα</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Προέλευση / Χώρα</label>
                    <select id="filterCountry" onchange="applyFilters()">
                        <option value="all">Όλες οι Χώρες</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Έτος Κατασκευής</label>
                    <select id="filterYear" onchange="applyFilters()">
                        <option value="all">Όλα τα Έτη</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Πλέγμα Οχημάτων -->
        <div class="showroom-grid" id="showroomGrid">
            <!-- Τα αυτοκίνητα θα φορτωθούν εδώ δυναμικά -->
        </div>
    </div>

    <script>
        // Στοιχεία σύνδεσης Supabase
        const sbUrl = "https://qwcdqsmoabmbeaviioh.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpY2I0bXR5cCI6IkpXTSIsInFubF9pZCI6YmFmYzZzIiSInJlZ2lzdHJhZ2lsZ21uYmJ1YmJ1Y21yZ21uYmJMInFubF9pZ3pXQjE5YXZpYW9iOW9paWwicm9sZSI6ImFub255bW91cyIsInN0YXR1cyI6ImFjdGl2ZSIsImV4cCI6MTA0NDM1ImV4cCI6MjA0ODMsImV4cCI6M00ja01Njg0Njg0M00.gM";
        const sbClient = supabase.createClient(sbUrl, sbKey);

        let allCars = [];
        const whatsappNumber = "35794628922";

        async function fetchShowroom() {
            const { data: cars, error } = await sbClient
                .from('cars')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error("Σφάλμα:", error);
                return;
            }

            allCars = cars || [];
            buildFilterOptions();
            renderCars(allCars);
        }

        function buildFilterOptions() {
            const brands = new Set();
            const countries = new Set();
            const years = new Set();

            allCars.forEach(car => {
                if (car.brand) brands.add(car.brand);
                if (car.country) countries.add(car.country);
                if (car.year) years.add(car.year);
            });

            const brandSelect = document.getElementById('filterBrand');
            Array.from(brands).sort().forEach(b => {
                brandSelect.innerHTML += `<option value="${b}">${b}</option>`;
            });

            const countrySelect = document.getElementById('filterCountry');
            Array.from(countries).sort().forEach(c => {
                countrySelect.innerHTML += `<option value="${c}">${c}</option>`;
            });

            const yearSelect = document.getElementById('filterYear');
            Array.from(years).sort((a,b)=>b-a).forEach(y => {
                yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
            });
        }

        function renderCars(carsToDisplay) {
            const container = document.getElementById('showroomGrid');
            if (carsToDisplay.length === 0) {
                container.innerHTML = `<div style="grid-column: span 3; text-align: center; color:var(--text-muted); padding:40px;">Δεν βρέθηκαν οχήματα με τα συγκεκριμένα κριτήρια.</div>`;
                return;
            }

            container.innerHTML = '';

            carsToDisplay.forEach(car => {
                // Διαχείριση Φωτογραφιών (Array, String ή fallback)
                let carImages = [];
                if (Array.isArray(car.images) && car.images.length > 0) {
                    carImages = car.images;
                } else if (car.images && typeof car.images === 'string') {
                    carImages = car.images.replace(/{|}/g, '').split(',').filter(img => img.trim() !== '');
                }
                if (carImages.length === 0 && car.image_url) {
                    carImages = [car.image_url];
                }
                if (carImages.length === 0) {
                    carImages = ['https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=600&q=80'];
                }

                const formattedPrice = Number(car.price).toLocaleString('el-GR');
                const formattedKm = Number(car.mileage).toLocaleString('el-GR');

                // Μηνύματα για WhatsApp και Viber
                const message = encodeURIComponent(`Γεια σας, ενδιαφέρομαι για το όχημα: ${car.brand} ${car.model} (${car.year}) - ${formattedPrice} €`);
                const waLink = `https://wa.me/${whatsappNumber}?text=${message}`;
                const viberLink = `viber://contact?number=%2B${whatsappNumber}`;

                const carCard = document.createElement('div');
                carCard.className = 'car-card';

                carCard.innerHTML = `
                    <div class="image-slider-container">
                        <span class="status-badge">${car.status || 'ΣΕ ΑΠΟΘΕΜΑ'}</span>
                        <div class="slider-wrapper" id="slider-${car.id}">
                            ${carImages.map((img, index) => `
                                <img src="${img.trim()}" class="slider-img ${index === 0 ? 'active' : ''}" alt="${car.brand} ${car.model}" onerror="this.src='https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=600&q=80'">
                            `).join('')}
                        </div>
                        ${carImages.length > 1 ? `
                            <button class="slider-btn prev" onclick="moveSlider('${car.id}', -1)">&#10094;</button>
                            <button class="slider-btn next" onclick="moveSlider('${car.id}', 1)">&#10095;</button>
                        ` : ''}
                    </div>
                    <div class="car-info">
                        <h3>${car.brand} ${car.model}</h3>
                        <div class="specs">
                            <p>📅 Έτος: ${car.year}</p>
                            <p>🧭 Χιλιόμετρα: ${formattedKm} km</p>
                            <p>🎨 Χρώμα: ${car.color || 'N/A'}</p>
                        </div>
                        <div class="card-footer">
                            <span class="price">${formattedPrice} €</span>
                            <span class="country-tag">${car.country || 'JAPAN'}</span>
                        </div>
                        <!-- Δύο Κουμπιά Δίπλα-Δίπλα -->
                        <div class="action-buttons">
                            <a href="${waLink}" target="_blank" class="btn-action btn-whatsapp">
                                💬 WhatsApp
                            </a>
                            <a href="${viberLink}" class="btn-action btn-viber">
                                💜 Viber
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(carCard);
            });
        }

        function moveSlider(carId, direction) {
            const wrapper = document.getElementById(`slider-${carId}`);
            if (!wrapper) return;
            const images = wrapper.getElementsByClassName('slider-img');
            if (images.length <= 1) return;

            let activeIndex = -1;
            for (let i = 0; i < images.length; i++) {
                if (images[i].classList.contains('active')) {
                    activeIndex = i;
                    images[i].classList.remove('active');
                    break;
                }
            }

            let newIndex = activeIndex + direction;
            if (newIndex >= images.length) newIndex = 0;
            if (newIndex < 0) newIndex = images.length - 1;

            images[newIndex].classList.add('active');
        }

        function applyFilters() {
            const brandVal = document.getElementById('filterBrand').value;
            const countryVal = document.getElementById('filterCountry').value;
            const yearVal = document.getElementById('filterYear').value;

            const filtered = allCars.filter(car => {
                const matchBrand = (brandVal === 'all' || car.brand === brandVal);
                const matchCountry = (countryVal === 'all' || car.country === countryVal);
                const matchYear = (yearVal === 'all' || String(car.year) === yearVal);
                return matchBrand && matchCountry && matchYear;
            });

            renderCars(filtered);
        }

        // Εκκίνηση φόρτωσης
        window.onload = fetchShowroom;
    </script>
</body>
</html>
