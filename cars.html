<script>
        const sbUrl = "https://qwcdqsmoaobmbeaviioh.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Y2Rxc21vYW9ibWJlYXZpaW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzA4ODMsImV4cCI6MjA5NjM0Njg4M30.gba-EgEOCQPPvJONrXOUlxQke4caSjnEZ-L9lpy7zaw";
        const sbClient = supabase.createClient(sbUrl, sbKey);

        let allCars = [];

        async function loadShowroom() {
            const { data: cars, error } = await sbClient.from('cars').select('*').order('id', { ascending: false });
            
            if (error) {
                console.error("Σφάλμα Supabase:", error);
                document.getElementById('showroomGrid').innerHTML = "<p style='color: red; grid-column: span 3; text-align:center;'>Αποτυχία φόρτωσης οχημάτων.</p>";
                return;
            }

            allCars = cars || [];
            setupFilters();
            renderCars(allCars);
        }

        function setupFilters() {
            const brands = new Set();
            const countries = new Set();
            const years = new Set();

            allCars.forEach(car => {
                if (car.brand_model) {
                    // Παίρνουμε την πρώτη λέξη σαν Μάρκα για το φίλτρο
                    const mainBrand = car.brand_model.split(' ')[0].toUpperCase();
                    brands.add(mainBrand);
                }
                if (car.country) countries.add(car.country.toUpperCase());
                if (car.year) years.add(car.year);
            });

            // Γέμισμα Φίλτρου Μάρκας
            const brandSelect = document.getElementById('filterBrand');
            brandSelect.innerHTML = '<option value="all">Όλα τα Οχήματα</option>';
            Array.from(brands).sort().forEach(b => {
                brandSelect.innerHTML += `<option value="${b}">${b}</option>`;
            });

            // Γέμισμα Φίλτρου Χώρας
            const countrySelect = document.getElementById('filterCountry');
            if (countrySelect) {
                countrySelect.innerHTML = '<option value="all">Όλες οι Χώρες</option>';
                Array.from(countries).sort().forEach(c => {
                    countrySelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
            }

            // Γέμισμα Φίλτρου Έτους
            const yearSelect = document.getElementById('filterYear');
            if (yearSelect) {
                yearSelect.innerHTML = '<option value="all">Όλα τα Έτη</option>';
                Array.from(years).sort((a,b)=>b-a).forEach(y => {
                    yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
                });
            }
        }

        function renderCars(carsToDisplay) {
            const container = document.getElementById('showroomGrid');
            if (!container) return;

            if (carsToDisplay.length === 0) {
                container.innerHTML = `<div style="grid-column: span 3; text-align:center; color:var(--text-muted); padding:40px;">Δεν βρέθηκαν οχήματα με τα συγκεκριμένα κριτήρια.</div>`;
                return;
            }

            container.innerHTML = carsToDisplay.map(car => {
                // Διαχείριση Τιμής
                let displayPrice = "ON REQUEST";
                if (car.price && String(car.price).trim() !== "") {
                    let cleanPrice = String(car.price).replace(/[^0-9]/g, '');
                    if (cleanPrice !== "") displayPrice = parseInt(cleanPrice).toLocaleString('el-GR') + " €";
                }

                // Διαχείριση Φωτογραφίας (Κύρια Εικόνα)
                let mainImg = "https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=600&q=80"; 
                if (car.image_url) {
                    mainImg = car.image_url;
                } else if (car.images) {
                    if (Array.isArray(car.images) && car.images.length > 0) mainImg = car.images[0];
                    else if (typeof car.images === 'string' && car.images.trim() !== "") {
                        let cleanImgs = car.images.replace(/[\{\}\"\']/g, '').split(',');
                        if (cleanImgs[0]) mainImg = cleanImgs[0].trim();
                    }
                }

                // Μήνυμα Χιλιομέτρων
                let kmText = car.mileage ? parseInt(String(car.mileage).replace(/[^0-9]/g, '') || 0).toLocaleString('el-GR') + " KM" : "0 KM";

                return `
                    <div class="car-card">
                        <div class="car-image-container">
                            <img src="${mainImg}" alt="${car.brand_model}" class="car-image">
                            <span class="status-badge">${car.status || 'Stock'}</span>
                        </div>
                        <div class="car-details">
                            <h3 class="car-title">${car.brand_model || 'Unknown Car'}</h3>
                            <div class="car-specs">
                                <span>📅 ${car.year || 'N/A'}</span>
                                <span>🛣️ ${kmText}</span>
                                <span>🎨 ${car.color || 'N/A'}</span>
                                <span>📍 ${car.country || 'N/A'}</span>
                            </div>
                            <div class="car-footer">
                                <span class="car-price">${displayPrice}</span>
                                <a href="contact.html?car=${encodeURIComponent(car.brand_model)}" class="btn-interest">ΕΚΔΗΛΩΣΗ ΕΝΔΙΑΦΕΡΟΝΤΟΣ</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterCars() {
            const brandVal = document.getElementById('filterBrand').value;
            const countrySelect = document.getElementById('filterCountry');
            const yearSelect = document.getElementById('filterYear');

            const countryVal = countrySelect ? countrySelect.value : 'all';
            const yearVal = yearSelect ? yearSelect.value : 'all';

            let filtered = allCars.filter(car => {
                let matchBrand = true;
                let matchCountry = true;
                let matchYear = true;

                if (brandVal !== 'all' && car.brand_model) {
                    const mainBrand = car.brand_model.split(' ')[0].toUpperCase();
                    if (mainBrand !== brandVal) matchBrand = false;
                }
                if (countryVal !== 'all' && car.country && car.country.toUpperCase() !== countryVal) {
                    matchCountry = false;
                }
                if (yearVal !== 'all' && car.year && String(car.year) !== yearVal) {
                    matchYear = false;
                }

                return matchBrand && matchCountry && matchYear;
            });

            renderCars(filtered);
        }

        // Σύνδεση των αλλαγών στα φίλτρα
        document.getElementById('filterBrand').addEventListener('change', filterCars);
        if (document.getElementById('filterCountry')) document.getElementById('filterCountry').addEventListener('change', filterCars);
        if (document.getElementById('filterYear')) document.getElementById('filterYear').addEventListener('change', filterCars);

        window.onload = loadShowroom;
    </script>
