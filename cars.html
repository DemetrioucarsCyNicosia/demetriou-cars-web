<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | C.J. Demetriou Motors</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="supabase.js"></script>

    <style>
        :root {
            --bg-dark: #0d0d12;
            --accent: #bfa36a;
            --card-bg: rgba(20, 20, 28, 0.95);
            --line-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #90909a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            border-bottom: 1px solid var(--line-color);
            background: #0b0b0f;
        }

        .logo {
            font-family: "Times New Roman", serif;
            color: var(--accent);
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            font-family: "Times New Roman", serif;
            font-size: 32px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            color: #fff;
        }

        .filters-box {
            background: var(--card-bg);
            border: 1px solid var(--line-color);
            padding: 30px;
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .filters-box h2 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .filter-group select {
            background: #14141c;
            border: 1px solid var(--line-color);
            color: #fff;
            padding: 12px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            border-radius: 2px;
        }

        .showroom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .car-card {
            background: var(--card-bg);
            border: 1px solid var(--line-color);
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }

        .car-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .car-image-container {
            position: relative;
            height: 230px;
            background: #14141c;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .car-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-image-placeholder {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent);
            color: #0d0d12;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
        }

        .car-details {
            padding: 25px;
        }

        .car-title {
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            color: #fff;
        }

        .car-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }

        .car-specs span {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .car-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .car-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .btn-interest {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .btn-interest:hover {
            background: var(--accent);
            color: #0d0d12;
        }
    </style>
</head>
