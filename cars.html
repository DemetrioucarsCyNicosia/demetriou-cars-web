<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --accent: #c5a880;
            --accent-hover: #b3946b;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Header & Navigation */
        header {
            background-color: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-container h2 {
            font-family: 'Times New Roman', serif;
            letter-spacing: 2px;
            font-size: 18px;
            color: var(--accent);
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
        }

        /* Showroom Layout */
        .showroom-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .showroom-title {
            font-family: 'Times New Roman', serif;
            font-size: 32px;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 40px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        /* Filters */
        .filter-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .filter-section h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group select {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 13px;
        }

        /* Grid & Cards */
        .showroom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
        }

        .car-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }

        .car-card:hover {
            border-color: var(--accent);
        }

        /* Slider Styles */
        .image-slider-container {
            position: relative;
            width: 100%;
            height: 260px;
            background-color: #000;
            overflow: hidden;
        }

        .slider-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slider-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .slider-img.active {
            opacity: 1;
            position: relative;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .slider-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .slider-btn.prev { left: 0; }
        .slider-btn.next { right: 0; }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--accent);
            color: #000;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 5;
        }

        .car-info {
            padding: 25px;
        }

        .car-info h3 {
            font-family: 'Times New Roman', serif;
            font-size: 22px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .specs {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .country-tag {
            font-size: 11px;
            background-color: #1a1a1a;
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Action Button */
        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 14px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-whatsapp:hover {
            background-color: var(--accent);
            color: #000;
        }

        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; gap: 20px; }
            .showroom-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h2>C.J. DEMETRIOU MOTORS</h2>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cars.html" class="active">Cars</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <div class="showroom-container">
        <h1 class="showroom-title">Our Showroom</h1>

        <div class="filter-section">
            <h3>Φιλτράρισμα Showroom</h3>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Μάρκα / Μοντέλο</label>
                    <select id="filterBrand" onchange="applyFilters()">
                        <option value="all">Όλα τα Οχήματα</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Προέλευση / Χώρα</label>
                    <select id="filterCountry" onchange="applyFilters()">
                        <option value="all">Όλες οι Χώρες</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Έτος Κατασκευής</label>
                    <select id="filterYear" onchange="applyFilters()">
                        <option value="all">Όλα τα Έτη</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="showroom-grid" id="showroomGrid"></div>
    </div>

    <script>
        const sbUrl = "https://qwcdqsmoabmbeaviioh.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZmYiOiJxd2NkcXNtb2FibWJlYXZpaW9paCIsInJvbGUiOiJhbm9ueW1vdXMiLCJpYXQiOjE3MTU0Mjg0MzMsImV4cCI6MjAzMTAwNDQzM30.gM73vM8HwN0wB19aFvN5b_8ub99Mv0R_g3M1bKM684M";
        const sbClient = supabase.createClient(sbUrl, sbKey);

        let allCars = [];
        const whatsappNumber = "35794628922";

        async function fetchShowroom() {
            try {
                const { data: cars, error } = await sbClient
                    .from('cars')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) {
                    console.error("Σφάλμα Supabase:", error);
                    return;
                }

                allCars = cars || [];
                buildFilterOptions();
                renderCars(allCars);
            } catch (err) {
                console.error("Σφάλμα κατά τη φόρτωση:", err);
            }
        }

        function buildFilterOptions() {
            const brands = new Set();
            const countries = new Set();
            const years = new Set();

            allCars.forEach(car => {
                if (car.brand) brands.add(car.brand.toUpperCase());
                if (car.country) countries.add(car.country.toUpperCase());
                if (car.year) years.add(car.year);
            });

            updateSelectElement('filterBrand', brands, 'Όλα τα Οχήματα');
            updateSelectElement('filterCountry', countries, 'Όλες οι Χώρες');
            updateSelectElement('filterYear', years, 'Όλα τα Έτη', true);
        }

        function updateSelectElement(id, set, defaultText, numericSort = false) {
            const select = document.getElementById(id);
            if (!select) return;
            select.innerHTML = `<option value="all">${defaultText}</option>`;
            
            const sortedArray = Array.from(set).sort((a, b) => {
                if (numericSort) return b - a;
                return String(a).localeCompare(String(b));
            });

            sortedArray.forEach(val => {
                select.innerHTML += `<option value="${val}">${val}</option>`;
            });
        }

        function renderCars(carsToDisplay) {
            const container = document.getElementById('showroomGrid');
            if (!container) return;

            if (carsToDisplay.length === 0) {
                container.innerHTML = `<div style="grid-column: span 3; text-align: center; color:var(--text-muted); padding:40px;">Δεν βρέθηκαν οχήματα.</div>`;
                return;
            }

            container.innerHTML = '';

            carsToDisplay.forEach(car => {
                // Απόλυτα ασφαλής καθαρισμός και εξαγωγή των URLs των φωτογραφιών από το Array της Supabase
                let carImages = [];
                if (car.images) {
                    if (Array.isArray(car.images)) {
                        carImages = car.images;
                    } else if (typeof car.images === 'string') {
                        carImages = car.images.replace(/[\{\}\"\'\[\]]/g, '').split(',').map(s => s.trim()).filter(s => s !== '');
                    }
                }
                
                if (carImages.length === 0 && car.image_url) {
                    carImages = [car.image_url];
                }
                if (carImages.length === 0) {
                    carImages = ['https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=600&q=80'];
                }

                const formattedPrice = car.price ? Number(car.price).toLocaleString('el-GR') : 'On Request';
                const formattedKm = car.mileage ? Number(car.mileage).toLocaleString('el-GR') : '0';

                const message = encodeURIComponent(`Γεια σας, ενδιαφέρομαι για το όχημα: ${car.brand} ${car.model} (${car.year}) - ${formattedPrice} €`);
                const waLink = `https://wa.me/${whatsappNumber}?text=${message}`;

                const carCard = document.createElement('div');
                carCard.className = 'car-card';

                carCard.innerHTML = `
                    <div class="image-slider-container">
                        <span class="status-badge">${(car.status || 'ΣΕ ΑΠΟΘΕΜΑ').toUpperCase()}</span>
                        <div class="slider-wrapper" id="slider-${car.id}">
                            ${carImages.map((img, index) => `
                                <img src="${img}" class="slider-img ${index === 0 ? 'active' : ''}" alt="${car.brand}" onerror="this.src='https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=600&q=80'">
                            `).join('')}
                        </div>
                        ${carImages.length > 1 ? `
                            <button class="slider-btn prev" onclick="moveSlider('${car.id}', -1)">&#10094;</button>
                            <button class="slider-btn next" onclick="moveSlider('${car.id}', 1)">&#10095;</button>
                        ` : ''}
                    </div>
                    <div class="car-info">
                        <h3>${car.brand} ${car.model}</h3>
                        <div class="specs">
                            <div class="spec-item">📅 <span>Έτος: ${car.year || 'N/A'}</span></div>
                            <div class="spec-item">🧭 <span>Χιλιόμετρα: ${formattedKm} km</span></div>
                            <div class="spec-item">🎨 <span>Χρώμα: ${car.color || 'N/A'}</span></div>
                        </div>
                        <div class="card-footer">
                            <span class="price">${formattedPrice} ${car.price ? '€' : ''}</span>
                            <span class="country-tag">${car.country || 'JAPAN'}</span>
                        </div>
                        <a href="${waLink}" target="_blank" class="btn-whatsapp">
                            💬 ΕΝΔΙΑΦΕΡΟΜΑΙ
                        </a>
                    </div>
                `;
                container.appendChild(carCard);
            });
        }

        function moveSlider(carId, direction) {
            const wrapper = document.getElementById(`slider-${carId}`);
            if (!wrapper) return;
            const images = wrapper.getElementsByClassName('slider-img');
            if (images.length <= 1) return;

            let activeIndex = -1;
            for (let i = 0; i < images.length; i++) {
                if (images[i].classList.contains('active')) {
                    activeIndex = i;
                    images[i].classList.remove('active');
                    break;
                }
            }

            let newIndex = activeIndex + direction;
            if (newIndex >= images.length) newIndex = 0;
            if (newIndex < 0) newIndex = images.length - 1;

            images[newIndex].classList.add('active');
        }

        function applyFilters() {
            const brandVal = document.getElementById('filterBrand')?.value || 'all';
            const countryVal = document.getElementById('filterCountry')?.value || 'all';
            const yearVal = document.getElementById('filterYear')?.value || 'all';

            const filtered = allCars.filter(car => {
                const matchBrand = (brandVal === 'all' || (car.brand && car.brand.toUpperCase() === brandVal));
                const matchCountry = (countryVal === 'all' || (car.country && car.country.toUpperCase() === countryVal));
                const matchYear = (yearVal === 'all' || String(car.year) === yearVal);
                return matchBrand && matchCountry && matchYear;
            });

            renderCars(filtered);
        }

        window.onload = fetchShowroom;
    </script>
</body>
</html>
