<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Showroom | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: sans-serif; padding: 20px; }
        .car-card { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #c5a059; }
        h1 { color: #c5a059; text-align: center; }
    </style>
</head>
<body>

    <h1>Το Στοκ μας</h1>
    <div id="cars-container">Φόρτωση οχημάτων...</div>

    <script>
        // ΠΡΟΣΟΧΗ: Βάλε εδώ τα δικά σου κλειδιά!
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function loadCars() {
            const container = document.getElementById('cars-container');
            
            try {
                const { data, error } = await supabase
                    .from('cars')
                    .select('*');

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = "Δεν βρέθηκαν οχήματα στο στοκ.";
                    return;
                }

                container.innerHTML = ''; // Καθαρισμός του "Φόρτωση..."
                data.forEach(car => {
                    const div = document.createElement('div');
                    div.className = 'car-card';
                    div.innerHTML = `
                        <h3>${car.brand_model || 'Αγνωστο'}</h3>
                        <p>Χώρα: ${car.country || 'N/A'}</p>
                        <p>Τιμή: ${car.price || 'N/A'}</p>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = "Σφάλμα σύνδεσης: " + err.message;
                console.error("Supabase Error:", err);
            }
        }

        loadCars();
    </script>
</body>
</html>
