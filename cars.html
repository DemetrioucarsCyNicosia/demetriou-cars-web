<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=0.4, user-scalable=yes">
    <title>Showroom | C.J. Demetriou Motors</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0b0f;
            --card-bg: #111116;
            --accent: #bfa36a;
            --text-main: #ffffff;
            --text-muted: #90909a;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            padding-bottom: 60px; 
            width: 1200px; 
            margin: 0 auto; 
            overflow-x: hidden; 
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 30px 5%; border-bottom: 1px solid var(--border-color); background: rgba(11, 11, 15, 0.9); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo-container a { text-decoration: none; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-left: 30px; font-weight: 500; transition: color 0.3s; }
        nav a:hover, nav a.active { color: var(--accent); }

        .filter-section { max-width: 1200px; margin: 40px auto; padding: 30px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; }
        .filter-section h3 { font-family: "Times New Roman", serif; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; text-align: center; }
        .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 9px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
        .filter-group select { background: #181822; border: 1px solid var(--border-color); color: #fff; padding: 12px; font-size: 13px; outline: none; border-radius: 2px; transition: border-color 0.3s; cursor: pointer; }

        .showroom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .car-card { background: #ffffff; color: #111116; border: 1px solid #eef0f2; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.3s, box-shadow 0.3s; position: relative; }
        .car-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        .image-slider-container { width: 100%; aspect-ratio: 16/10; position: relative; overflow: hidden; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.4s ease-in-out; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #fff; border: none; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 50%; z-index: 5; }
        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }
        
        .status-badge { position: absolute; top: 15px; left: 15px; padding: 6px 12px; font-size: 9px; text-transform: uppercase; font-weight: bold; border-radius: 2px; z-index: 6; }
        .status-stock { background: #bfa36a; color: #0b0b0f; }
        .status-preorder { background: #2ecc71; color: #fff; }
        .status-coming { background: #3498db; color: #fff; }
        .status-sold { background: #e74c3c; color: #fff; }

        .car-details { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; background: #ffffff; }
        .car-details h4 { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 700; color: #1a1a1a; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
        
        .car-id-label { font-size: 11px; color: #70707a; margin-bottom: 15px; }
        
        /* 6-Position Technical Specs Grid */
        .specs-grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 10px; border-bottom: 1px solid #f0f2f5; padding-bottom: 20px; margin-bottom: 15px; }
        .spec-item-box { font-size: 12px; color: #50505a; display: flex; align-items: center; gap: 8px; }
        .spec-item-box i { color: #90909a; width: 16px; text-align: center; }
        
        .price-and-action { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price-container { display: flex; flex-direction: column; }
        .price-eur { font-weight: 800; font-size: 20px; color: #111116; }
        
        .arrow-circle-btn { width: 32px; height: 32px; border: 1px solid #111116; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #111116; transition: background 0.3s, color 0.3s; }
        .car-card:hover .arrow-circle-btn { background: #111116; color: #ffffff; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html">
                <h2 style="font-family:'Times New Roman', serif; letter-spacing:2px; color:var(--accent); margin:0;">C.J. DEMETRIOU MOTORS</h2>
            </a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="cars.html" class="active">Cars</a>
        </nav>
    </header>

    <div class="filter-section">
        <h3>Φιλτράρισμα Showroom</h3>
        <div class="filter-grid">
            <div class="filter-group">
                <label for="filterBrand">Μάρκα / Μοντέλο</label>
                <select id="filterBrand" onchange="applyFilters()">
                    <option value="all">Όλα τα Οχήματα</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterCountry">Προέλευση / Χώρα</label>
                <select id="filterCountry" onchange="applyFilters()">
                    <option value="all">Όλες οι Χώρες</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterYear">Έτος</label>
                <select id="filterYear" onchange="applyFilters()">
                    <option value="all">Όλα τα Έτη</option>
                </select>
            </div>
        </div>
    </div>

    <div class="showroom-grid" id="showroomGrid"></div>

    <script>
        const sbUrl = "https://qwcdqsmoaobmbeaviioh.supabase.co";
        const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Y2Rxc21vYW9ibWJlYXZpaW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzA4ODMsImV4cCI6MjA5NjM0Njg4M30.gba-EgEOCQPPvJONrXOUlxQke4caSjnEZ-L9lpy7zaw";
        const sbClient = supabase.createClient(sbUrl, sbKey);
        let allCars = [];

        async function fetchShowroom() {
            const { data: cars, error } = await sbClient.from('cars').select('*').order('id', { ascending: false });
            if (error) return;
            allCars = cars || [];
            buildFilterOptions();
            renderCars(allCars);
        }

        function buildFilterOptions() {
            const brands = new Set(), countries = new Set(), years = new Set();
            allCars.forEach(car => {
                if (car.brand_model) brands.add(car.brand_model.split(' ')[0].toUpperCase());
                if (car.country) countries.add(car.country.toUpperCase());
                if (car.year) years.add(car.year);
            });
            brands.forEach(b => document.getElementById('filterBrand').innerHTML += `<option value="${b}">${b}</option>`);
            countries.forEach(c => document.getElementById('filterCountry').innerHTML += `<option value="${c}">${c}</option>`);
            Array.from(years).sort((a,b)=>b-a).forEach(y => document.getElementById('filterYear').innerHTML += `<option value="${y}">${y}</option>`);
        }

        function renderCars(carsToDisplay) {
            const container = document.getElementById('showroomGrid');
            container.innerHTML = carsToDisplay.map((car, carIdx) => {
                let carImages = (car.images && car.images.length > 0) ? car.images : [car.image_url || 'https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=600&q=80'];
                
                // Καθαρισμός και μορφοποίηση τιμής EUR
                let cleanPrice = (car.price && car.price.trim() !== "") ? parseInt(car.price.replace(/[^0-9]/g, '')) : 0;
                let displayPriceEUR = cleanPrice > 0 ? cleanPrice.toLocaleString('el-GR') + " €" : "On Request";
                
                let statusClass = 'status-stock', statusText = 'Σε Απόθεμα';
                if(car.status === 'Pre-order') { statusClass = 'status-preorder'; statusText = 'Pre-Order'; }
                else if(car.status === 'Coming soon') { statusClass = 'status-coming'; statusText = 'Coming Soon'; }
                else if(car.status === 'Sold') { statusClass = 'status-sold'; statusText = 'Sold'; }
                
                // Διαχείριση των specs (χρησιμοποιεί τα δεδομένα της βάσης ή εμφανίζει έξυπνα default)
                let bodyType = car.body_type || (car.brand_model && car.brand_model.toLowerCase().includes('rover') ? 'SUV' : 'Saloon');
                let transmission = car.transmission || 'Automatic';
                let fuelType = car.fuel || 'Petrol';
                let driveTrain = car.drive || (car.brand_model && car.brand_model.toLowerCase().includes('evoqe') ? '4WD' : 'RWD');
                let mileageDisplay = car.mileage ? parseInt(car.mileage.replace(/[^0-9]/g, '')).toLocaleString('en-GB') + " miles" : "0 miles";
                
                return `
                    <a href="details.html?id=${car.id}" style="text-decoration:none; color:inherit; display:block;">
                        <div class="car-card">
                            <div class="image-slider-container">
                                <span class="status-badge ${statusClass}">${statusText}</span>
                                <div class="slider-wrapper" id="slider-${carIdx}" data-current="0">
                                    ${carImages.map(img => `<img src="${img}" alt="${car.brand_model}">`).join('')}
                                </div>
                                ${carImages.length > 1 ? `<button class="slider-btn prev" onclick="event.preventDefault(); moveSlider(${carIdx}, -1, ${carImages.length})"><i class="fa-solid fa-chevron-left"></i></button><button class="slider-btn next" onclick="event.preventDefault(); moveSlider(${carIdx}, 1, ${carImages.length})"><i class="fa-solid fa-chevron-right"></i></button>` : ''}
                            </div>
                            <div class="car-details">
                                <h4>${car.brand_model}</h4>
                                <div class="car-id-label">ID: #30${car.id}</div>
                                
                                <!-- 6-Position Specs Grid (Layout exact as image_8084de.jpg) -->
                                <div class="specs-grid-layout">
                                    <div class="spec-item-box"><i class="fa-solid fa-car"></i> ${bodyType}</div>
                                    <div class="spec-item-box"><i class="fa-solid fa-gear"></i> ${transmission}</div>
                                    <div class="spec-item-box"><i class="fa-solid fa-gas-pump"></i> ${fuelType}</div>
                                    <div class="spec-item-box"><i class="fa-solid fa-road"></i> ${mileageDisplay}</div>
                                    <div class="spec-item-box"><i class="fa-solid fa-sliders"></i> ${driveTrain}</div>
                                    <div class="spec-item-box"><i class="fa-solid fa-calendar"></i> ${car.year || 'N/A'}</div>
                                </div>
                                
                                <!-- Price & Action Area -->
                                <div class="price-and-action">
                                    <div class="price-container">
                                        <span class="price-eur">${displayPriceEUR}</span>
                                    </div>
                                    <div class="arrow-circle-btn">
                                        <i class="fa-solid fa-chevron-right" style="font-size: 11px;"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function moveSlider(carIdx, dir, total) {
            const wrapper = document.getElementById(`slider-${carIdx}`);
            let curr = (parseInt(wrapper.getAttribute('data-current')) + dir + total) % total;
            wrapper.setAttribute('data-current', curr);
            wrapper.style.transform = `translateX(-${curr * 100}%)`;
        }

        function applyFilters() {
            const b = document.getElementById('filterBrand').value, c = document.getElementById('filterCountry').value, y = document.getElementById('filterYear').value;
            renderCars(allCars.filter(car => (b === 'all' || (car.brand_model && car.brand_model.toUpperCase().startsWith(b))) && (c === 'all' || (car.country && car.country.toUpperCase() === c)) && (y === 'all' || (car.year && car.year.toString() === y))));
        }

        window.onload = fetchShowroom;
    </script>
</body>
</html>
