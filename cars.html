<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | C.J. Demetriou Motors</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #0f0f0f; --accent: #c5a059; --text-main: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        h1 { color: var(--accent); text-align: center; }
        #cars-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .car-card { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 10px; transition: 0.3s; }
        .car-card:hover { border-color: var(--accent); }
        .car-card h3 { color: var(--accent); margin-top: 0; }
        .car-card p { margin: 5px 0; }
    </style>
</head>
<body>

    <h1>Το Στοκ μας</h1>
    <div id="cars-container">Φόρτωση οχημάτων...</div>

    <script>
        // Αντικατάστησε με τα δικά σου στοιχεία
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY');

        async function fetchCars() {
            const container = document.getElementById('cars-container');
            
            try {
                // Fetch δεδομένα από τον πίνακα 'cars'
                const { data, error } = await supabase
                    .from('cars')
                    .select('*');

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>Δεν υπάρχουν οχήματα αυτή τη στιγμή.</p>";
                    return;
                }

                container.innerHTML = '';
                data.forEach(car => {
                    const card = document.createElement('div');
                    card.className = 'car-card';
                    card.innerHTML = `
                        <h3>${car.brand_model || 'Αγνωστο Μοντέλο'}</h3>
                        <p><strong>Χώρα:</strong> ${car.country || 'N/A'}</p>
                        <p><strong>Έτος:</strong> ${car.year || 'N/A'}</p>
                        <p><strong>Χιλιόμετρα:</strong> ${car.mileage || 'N/A'}</p>
                        <p><strong>Χρώμα:</strong> ${car.color || 'N/A'}</p>
                        <p><strong>Τιμή:</strong> ${car.price ? car.price + ' €' : 'Κατόπιν συνεννόησης'}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = "Σφάλμα φόρτωσης: " + err.message;
                console.error(err);
            }
        }

        fetchCars();
    </script>
</body>
</html>
